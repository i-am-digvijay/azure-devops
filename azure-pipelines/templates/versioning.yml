parameters:
  - name: versionPrefix
    type: string
    default: '1.0'

steps:
- powershell: |
    $prefix = "${{ parameters.versionPrefix }}"
    $buildId = "$(Build.BuildId)"
    $tag = "${prefix}-$buildId"
    Write-Host "##vso[task.setvariable variable=imageTag]$tag"
    Write-Host "##vso[task.setvariable variable=artifactVersion]$tag"
  displayName: 'Generate image and artifact version'
